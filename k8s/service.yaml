apiVersion: v1
kind: Service
metadata:
  name: processzero-web
  labels:
    app: processzero-web
spec:
  # ClusterIP is the default and performs round-robin load balancing.
  # Use NodePort or LoadBalancer if you need external access.
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: processzero-web