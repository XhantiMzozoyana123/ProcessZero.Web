services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: processzero-web:latest
    container_name: processzero-web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # Override config via environment variables (use __ for nested keys).
      # By default the app uses the connection string baked into appsettings.json.
      # Uncomment the line below to point at the bundled "db" service instead:
      # ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=processzero;User=processzero;Password=processzero;AllowUserVariables=true;UseAffectedRows=false"
    restart: unless-stopped
    # Uncomment to use the local MySQL service below:
    # depends_on:
    #   db:
    #     condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional local MySQL database. The app currently points at a remote DB in
  # appsettings.json, so this is disabled by default. To use it:
  #   1. Uncomment this whole "db" block.
  #   2. Uncomment the ConnectionStrings__DefaultConnection env var above.
  #   3. Uncomment the depends_on block above.
  # ---------------------------------------------------------------------------
  # db:
  #   image: mysql:8.0
  #   container_name: processzero-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: processzero
  #     MYSQL_USER: processzero
  #     MYSQL_PASSWORD: processzero
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

# volumes:
#   db_data:
