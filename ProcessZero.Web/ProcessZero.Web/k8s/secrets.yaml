---
# ProcessZero Kubernetes Secrets
# These should NOT be committed to Git!
# Instead, create them manually or use a secrets management tool.
# 
# To create these secrets on your cluster:
#   kubectl create secret generic processzero-secrets --from-literal=Twilio__AccountSid="..." --from-literal=Twilio__AuthToken="..." -n processzero
# 
# Or apply this file (after replacing placeholder values):
#   kubectl apply -f k8s/secrets.yaml
#
# ⚠️ WARNING: Base64 encoding is NOT encryption. For production, use:
#   - Azure Key Vault (AKS)
#   - AWS Secrets Manager (EKS)
#   - HashiCorp Vault
#   - Sealed Secrets
#   - SOPS (Secrets Operations)

apiVersion: v1
kind: Namespace
metadata:
  name: processzero

---
apiVersion: v1
kind: Secret
metadata:
  name: processzero-secrets
  namespace: processzero
type: Opaque
data:
  # Base64 encoded values (use: echo -n 'value' | base64)
  # ⚠️ REPLACE THESE WITH YOUR ACTUAL VALUES
  Twilio__AccountSid: "QUN4eHh4eHh4eHh4eHh4eHh4eHh4eHg="  # Replace with: echo -n 'ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx' | base64
  Twilio__AuthToken: "YXV0aF90b2tlbl9oZXJl"                   # Replace with: echo -n 'your_auth_token' | base64
  Twilio__PhoneNumber: "KzEyMzQ1Njc4OTA="                     # Replace with: echo -n '+1234567890' | base64

  # Database connection (if using local K8s database)
  # ConnectionStrings__DefaultConnection: "U2VydmVyPWRiLVNlcnZpY2U7UG9ydD0zMzA2O0RhdGFiYXNlPXByb2Nlc3N6ZXJvOy4uLg=="

  # Other API Keys
  CalOptions__ApiKey: "Y2FsX2xpdmVfeHh4eHh4eHg="              # Replace with: echo -n 'cal_live_xxxxx' | base64
  Paystack__SecretKey: "c2tfdGVzdF94eHh4eHh4"                 # Replace with: echo -n 'sk_test_xxxxx' | base64
  PayFast__MerchantId: "eHh4eHh4eHg="                         # Replace with: echo -n 'merchant_id' | base64
  PayFast__MerchantKey: "bWVyY2hhbnRfa2V5"                    # Replace with: echo -n 'merchant_key' | base64
  PayFast__Passphrase: "cGFzc3BocmFzZQ=="                     # Replace with: echo -n 'passphrase' | base64

  GoogleOAuth__ClientId: "Y2xpZW50X2lkX2hlcmU="                # Replace with: echo -n 'your_client_id' | base64
  GoogleOAuth__ClientSecret: "Y2xpZW50X3NlY3JldF9oZXJl"        # Replace with: echo -n 'your_client_secret' | base64

  Jwt__Key: "and0X2tleV9oZXJl"                                # Replace with: echo -n 'your_jwt_key' | base64

---
# Optional: ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: processzero-config
  namespace: processzero
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  DOTNET_RUNNING_IN_CONTAINER: "true"
  PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
  ENVIRONMENT_TYPE: "kubernetes"  # This helps detect we're running in K8s
